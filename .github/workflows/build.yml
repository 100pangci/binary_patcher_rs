name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $stage = "binary_patcher_rs"
          New-Item -ItemType Directory -Path $stage -Force
          Copy-Item "target\release\binary_patcher.exe" -Destination $stage
          Copy-Item "target\release\apply_patch.exe" -Destination $stage
          Copy-Item "target\release\rollback_patch.exe" -Destination $stage
          Compress-Archive -Path "$stage\*" -DestinationPath "binary_patcher_rs_toolkit_win.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-patcher-windows
          path: binary_patcher_rs_toolkit_win.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p binary_patcher_rs
          cp target/release/binary_patcher target/release/apply_patch target/release/rollback_patch binary_patcher_rs/
          tar czf binary_patcher_rs_toolkit_linux.tar.gz binary_patcher_rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-patcher-linux
          path: binary_patcher_rs_toolkit_linux.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p binary_patcher_rs
          cp target/release/binary_patcher target/release/apply_patch target/release/rollback_patch binary_patcher_rs/
          tar czf binary_patcher_rs_toolkit_macos.tar.gz binary_patcher_rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-patcher-macos
          path: binary_patcher_rs_toolkit_macos.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release_files
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release_files/ \;

      - uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          generate_release_notes: true
