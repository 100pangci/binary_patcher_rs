name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo check
        run: cargo check --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo test
        run: cargo test

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [check, test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: cargo build --release

      - name: Package toolkit
        shell: pwsh
        run: |
          $releaseDir = "Releases"
          New-Item -ItemType Directory -Path $releaseDir -Force
          Copy-Item "target\release\binary_patcher.exe" -Destination $releaseDir
          Copy-Item "target\release\apply_patch.exe" -Destination $releaseDir
          Copy-Item "target\release\rollback_patch.exe" -Destination $releaseDir
          Compress-Archive -Path "$releaseDir\*.exe" -DestinationPath "$releaseDir\binary_patcher_toolkit.zip" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-patcher-windows-${{ github.ref_name || 'manual' }}
          path: |
            Releases/*.exe
            Releases/binary_patcher_toolkit.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [check, test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: cargo build --release

      - name: Package toolkit
        run: |
          mkdir -p Releases
          cp target/release/binary_patcher Releases/
          cp target/release/apply_patch Releases/
          cp target/release/rollback_patch Releases/
          cd Releases && tar czf binary_patcher_toolkit.tar.gz binary_patcher apply_patch rollback_patch

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-patcher-linux-${{ github.ref_name || 'manual' }}
          path: |
            Releases/binary_patcher
            Releases/apply_patch
            Releases/rollback_patch
            Releases/binary_patcher_toolkit.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [check, test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: cargo build --release

      - name: Package toolkit
        run: |
          mkdir -p Releases
          cp target/release/binary_patcher Releases/
          cp target/release/apply_patch Releases/
          cp target/release/rollback_patch Releases/
          cd Releases && tar czf binary_patcher_toolkit.tar.gz binary_patcher apply_patch rollback_patch

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-patcher-macos-${{ github.ref_name || 'manual' }}
          path: |
            Releases/binary_patcher
            Releases/apply_patch
            Releases/rollback_patch
            Releases/binary_patcher_toolkit.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
            artifacts/**/binary_patcher_toolkit.zip
          generate_release_notes: true
